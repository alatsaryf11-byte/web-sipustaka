{% extends 'perpus/base.html' %}

{% block title %}{{ title }} - SIPUSTAKA{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
    <a href="{% url 'user_list' %}" class="text-slate-500 hover:text-slate-700 transition">
        <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div>
        <p class="text-slate-500">Kelola data user perpustakaan.</p>
        <h3 class="text-2xl font-semibold text-slate-900">{{ title }}</h3>
    </div>
</div>

<div class="rounded-3xl bg-white p-6 shadow-lg shadow-slate-200/60 border border-slate-200 max-w-4xl">
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid gap-4 sm:grid-cols-2">
            <label class="block">
                <span class="text-sm font-medium text-slate-700">Nama</span>
                <input type="text" name="nama" value="{{ siswa.nama|default:'' }}" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500" required>
            </label>
            <label class="block">
                <span class="text-sm font-medium text-slate-700">Kelas</span>
                <input type="text" name="kelas" value="{{ siswa.kelas|default:'' }}" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500" placeholder="Contoh: XI IPA 1" required>
            </label>
        </div>
        <div class="grid gap-4 sm:grid-cols-2">
            <label class="block">
                <span class="text-sm font-medium text-slate-700">NIS</span>
                <input type="text" name="nis" value="{{ siswa.nis|default:'' }}" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500" placeholder="Contoh: 2026005" required>
            </label>
            <label class="block">
                <span class="text-sm font-medium text-slate-700">Status Aktif</span>
                <div class="mt-2">
                    <label class="inline-flex items-center gap-2">
                        <input type="checkbox" name="is_active" {% if siswa.is_active or not siswa %}checked{% endif %} class="w-5 h-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500">
                        <span class="text-slate-700">Aktif</span>
                    </label>
                </div>
            </label>
        </div>
        <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200">
            <a href="{% url 'user_list' %}" class="rounded-2xl border border-slate-300 px-5 py-3 text-slate-700 hover:bg-slate-100 transition">Batal</a>
            <button type="submit" class="rounded-2xl bg-brand-600 px-5 py-3 text-white hover:bg-brand-700 transition">Simpan User</button>
        </div>
    </form>
</div>
{% endblock %}
