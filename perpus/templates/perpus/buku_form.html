{% extends 'perpus/base.html' %}

{% block title %}{{ title }} - SIPUSTAKA{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
    <a href="{% url 'buku_list' %}" class="text-slate-500 hover:text-slate-700 transition">
        <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div>
        <p class="text-slate-500">Kelola data buku perpustakaan.</p>
        <h3 class="text-2xl font-semibold text-slate-900">{{ title }}</h3>
    </div>
</div>

<div class="rounded-3xl bg-white p-6 shadow-lg shadow-slate-200/60 border border-slate-200 max-w-4xl">
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid gap-4 sm:grid-cols-2">
            <label class="block">
                <span class="text-sm font-medium text-slate-700">Judul Buku</span>
                <input type="text" name="judul" value="{{ buku.judul|default:'' }}" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500" required>
            </label>
            <label class="block">
                <span class="text-sm font-medium text-slate-700">Pengarang</span>
                <input type="text" name="pengarang" value="{{ buku.pengarang|default:'' }}" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500" required>
            </label>
        </div>
        <div class="grid gap-4 sm:grid-cols-2">
            <label class="block">
                <span class="text-sm font-medium text-slate-700">Kategori</span>
                <select name="kategori" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500" required>
                    <option value="">Pilih Kategori</option>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if buku.kategori == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </label>
            <label class="block">
                <span class="text-sm font-medium text-slate-700">Penerbit</span>
                <input type="text" name="penerbit" value="{{ buku.penerbit|default:'' }}" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500" required>
            </label>
        </div>
        <div class="grid gap-4 sm:grid-cols-2">
            <label class="block">
                <span class="text-sm font-medium text-slate-700">Tahun Terbit</span>
                <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit|default:'' }}" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500" required>
            </label>
            <label class="block">
                <span class="text-sm font-medium text-slate-700">Rak / Lokasi</span>
                <select name="rak" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500" required>
                    <option value="">Pilih Rak</option>
                    {% for r in rak_list %}
                    <option value="{{ r }}" {% if buku.rak == r %}selected{% endif %}>{{ r }}</option>
                    {% endfor %}
                </select>
            </label>
        </div>
        <div class="grid gap-4 sm:grid-cols-2">
            <label class="block">
                <span class="text-sm font-medium text-slate-700">Stok</span>
                <input type="number" name="stok" value="{{ buku.stok|default:'0' }}" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500" required>
            </label>
        </div>
        <label class="block">
            <span class="text-sm font-medium text-slate-700">Deskripsi</span>
            <textarea name="deskripsi" rows="3" class="mt-2 w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500">{{ buku.deskripsi|default:'' }}</textarea>
        </label>
        <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200">
            <a href="{% url 'buku_list' %}" class="rounded-2xl border border-slate-300 px-5 py-3 text-slate-700 hover:bg-slate-100 transition">Batal</a>
            <button type="submit" class="rounded-2xl bg-brand-600 px-5 py-3 text-white hover:bg-brand-700 transition">Simpan</button>
        </div>
    </form>
</div>
{% endblock %}
