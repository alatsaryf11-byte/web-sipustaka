{% extends 'perpus/base.html' %}

{% block title %}Hapus User - SIPUSTAKA{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-6">
    <a href="{% url 'user_list' %}" class="text-slate-500 hover:text-slate-700 transition">
        <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div>
        <p class="text-slate-500">Hapus data user.</p>
        <h3 class="text-2xl font-semibold text-slate-900">Hapus User</h3>
    </div>
</div>

<div class="rounded-3xl bg-white p-6 shadow-lg shadow-slate-200/60 border border-slate-200 max-w-2xl">
    <div class="text-center py-6">
        <span class="material-icons-outlined text-6xl text-rose-500">warning</span>
        <p class="mt-4 text-slate-700">Anda akan menghapus:</p>
        <p class="mt-2 text-xl font-semibold text-slate-900">{{ siswa.nama }}</p>
        <p class="mt-2 text-sm text-slate-500">Data user akan dihapus dari daftar anggota perpustakaan.</p>
    </div>
    <form method="post" class="flex items-center justify-center gap-3 pt-4 border-t border-slate-200">
        {% csrf_token %}
        <a href="{% url 'user_detail' siswa.id %}" class="rounded-2xl border border-slate-300 px-5 py-3 text-slate-700 hover:bg-slate-100 transition">Batalkan</a>
        <button type="submit" class="rounded-2xl bg-rose-600 px-5 py-3 text-white hover:bg-rose-700 transition">Hapus</button>
    </form>
</div>
{% endblock %}
